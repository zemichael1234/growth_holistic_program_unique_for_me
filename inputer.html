<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>growth holistic program</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #E6EFEC;
        }

        .kacha {
            margin-left: 250px;
        }

        .within {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .toper {
            background-color: white;
            border-radius: 5px;
            border: 1px solid black;
        }

        .top_bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 35px;
            margin: 0 50px;
            height: 110px;
        }

        .dis {
            text-decoration: none;
            color: black;
            font-weight: 100;
            font-family: sans-serif;
            font-size: 26px;
            margin: 0 50px;
            cursor: pointer;
        }

        .tim {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .pos {
            position: relative;
            right: 36px;
        }

        .b {
            margin: 10px 0px;
            padding: 10px;
            border-radius: 8px;
        }

        .buto {
            margin: 5px;
            height: 35px;
            margin: 10px 0px;
            border-radius: 8px;
        }

        .fiel {
            border-radius: 8px;
            height: 35px;
            border: 1px solid;
            margin-bottom:10px;
        }

        .tsa {
            border-radius: 8px;
            height: 20px;
            border: 1px solid;
            margin: 5px;
        }

        .within {
            border: 1px solid white;
            width: 550px;
            background-color: white;
            margin: 30px 0px;
            border-radius: 20px;
        }

        .wit {
            display: flex;
            justify-content: center;
        }
        .r{
            font-family:sans-serif;
        }
        #mm_contain {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            padding-bottom: 50px;
        }

        /* Base Card Style */
        .linker {
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 6px solid #cbd5e1;
        }

        .linker:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        /* Inner Layout */
        .link-info { display: flex; flex-direction: column; gap: 4px; }
        .link-tag { 
            font-size: 0.65rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            padding: 2px 8px;
            border-radius: 4px;
            width: fit-content;
        }

        .link-name {
            font-family: sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e293b;
        }

        .link-stat {
            text-align: right;
            display: flex;
            flex-direction: column;
        }

        .stat-num { font-size: 1.3rem; font-weight: 800; color: #1e293b; }
        .stat-desc { font-size: 0.7rem; color: #64748b; text-transform: uppercase; }

        /* Color Themes */
        .skill-card { border-left-color: #3b82f6; }
        .skill-card .link-tag { background: #dbeafe; color: #1e40af; }

        .habit-card { border-left-color: #10b981; }
        .habit-card .link-tag { background: #d1fae5; color: #065f46; }

        .goal-card { border-left-color: #f59e0b; }
        .goal-card .link-tag { background: #fef3c7; color: #92400e; }


    </style>

</head>
<body>
    <div class="toper">
        <div class="top_bar">
            <a class="dis" href="inputer.html">Grow skill</a>
            <a class="dis" href="index.html">Register skill</a>
            <a class="dis" href="register_habit.html">Register habit</a>
            <a class="dis" href="inputer_habit.html">Grow habit</a>
            <a class="dis" href="register_goal.html">Register goal</a>
        </div>
    </div>


    <div class="wit">
        <div class="within">
            <h1 style="font-family: sans-serif;">Grow your skill</h1>
     
            <span class="r">Enter skillname</span>
            <input type="text" placeholder="Enter skill" class="fiel" id="enter_skill">
            <span class="r">Enter repition</span>
            <input type="number" placeholder="reps" class="fiel" id="reps">
            <span class="r">Enter time</span>
            <input type="number" placeholder="time in minutes" class="fiel" id="time">
            <span class="r">Enter focus</span>
            <input type="number" placeholder="effort" class="fiel" id="effort">
            <button class="b" id="buut">Submit</button>
        </div>
    </div>


    <div id="mm_contain"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>


    <script src='scripting.js'></script>
    <script>
        let s_name = document.getElementById('enter_skill');
        let rep = document.getElementById('reps');
        let tim_ = document.getElementById('time');
        let effo = document.getElementById('effort');

        let s_button = document.getElementById('buut');

        s_button.addEventListener('click',grow);


        async function grow(){
            //console.log(s_name.value, rep.value,tim_.value,effo.value)

            let effort = Number(effo.value)
            let time = Number(tim_.value)
            let reps = Number(rep.value)


            if ((reps) === 0){
                reps=0
            }
            if ((time) === 0){
                time = 60
            }
            if ((effort) === 0){
                effort = 1
            }

            async function handleSkillUpdate() {
                input(s_name.value,{effort,time,reps})
                BSA(s_name.value)
                update_goals()
                goal_checker()
                rewarding_state(s_name.value);

                await writeData();  // ✅ If this is also async
                let retrieved_data = await GetData();  // ✅ Now await works
                saveto_localstorage(retrieved_data);
                show_result();

                
            }

            // Then call it:

            await handleSkillUpdate()

        }

        function show_result() {
            let shower = document.getElementById('mm_contain');
            shower.innerHTML = "";
            let current_data = datafrom_localstorage();
            let organized = []
            for (let d in current_data){
                organized.push(d)
            }
            if (!current_data) return;

            for (let data of organized.sort()) {
                let item = current_data[data];

                // 1. SKILL CARD
                if ('current_point_gained' in item) {
                    shower.insertAdjacentHTML('beforeend', `
                        <a href="dynamic.html" target="_blank" class="linker skill-card" id='${data}' data-category='skill'>
                            <div class="link-info">
                                <span class="link-tag">Skill</span>
                                <span class="link-name">${data}</span>
                            </div>
                            <div class="link-stat">
                                <span class="stat-num">${item.point || 0}</span>
                                <span class="stat-desc">Points</span>
                            </div>
                        </a>
                    `);
                } 
                // 2. HABIT CARD
                else if ('timestampss' in item) {
                    shower.insertAdjacentHTML('beforeend', `
                        <a href="habiter.html" target="_blank" class="linker habit-card" id='${data}' data-category='habit'>
                            <div class="link-info">
                                <span class="link-tag">Habit</span>
                                <span class="link-name">${data}</span>
                            </div>
                            <div class="link-stat">
                                <span class="stat-num">${item.total || 0}</span>
                                <span class="stat-desc">Total Reps</span>
                            </div>
                        </a>
                    `);
                } 
                // 3. GOAL CARD
                else if ('goal_requirment' in item) {
                    let percent = item.current_progress ? item.current_progress.percentage : 0;
                    shower.insertAdjacentHTML('beforeend', `
                        <a href="goaler.html" target="_blank" class="linker goal-card" id='${data}' data-category='goal'>
                            <div class="link-info">
                                <span class="link-tag">Goal</span>
                                <span class="link-name">${data}</span>
                            </div>
                            <div class="link-stat">
                                <span class="stat-num">${percent}%</span>
                                <span class="stat-desc">Complete</span>
                            </div>
                        </a>
                    `);
                }
            }


            let allers = document.getElementsByClassName('linker');

            for (let elem of allers){
                console.log(elem.addEventListener('click',work))
            }

         
        }
        show_result()



        function work(event) {
            // 2. Capture the data in variables immediately
            const category = event.target.dataset.category;
            const id = event.target.id;

            console.log(id, category);

            setTimeout(() => {
                // 3. Use the captured variables here
                sendMessage(category, id);
            }, 500);
        }

        function sendMessage(m,n) {

            const channel = new BroadcastChannel(m);
            channel.postMessage({type:m, value: n});
        }

    </script>


</body>
</html>
