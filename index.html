
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>growth holistic program</title>

    <style>
        body{
            margin: 0;
            padding: 0;
            background-color: #E6EFEC;

        }
        button{
            cursor: pointer;
        }
        select{
            cursor: pointer;
        }

        .within{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .toper{
            background-color: white;
            border-radius: 5px;
            border: 1px solid black;
        }
        .top_bar{
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 35px;
            margin: 0 50px;
            height: 110px;
        }
        .dis{
            text-decoration: none;
            color: black;
            font-weight: 100;
            font-family: sans-serif;
            font-size: 26px;
            margin: 0 50px;
            cursor: pointer;
        }
        .tim{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .pos{
            position:relative;
            right:36px;
        }
        .b{
            margin: 10px 0px;
            padding:10px;
            border-radius:8px;
            border:1px solid;
        }
        .buto {
            margin: 5px;
            height: 35px;
            border-radius: 8px;
            border: 1px solid;
        }
        .fiel {
            border-radius: 8px;
            height: 35px;
            border: 1px solid;
            margin: 5px;
        }
        .fila{
            border-radius: 8px;
            height: 25px;
            border: 1px solid;
            margin: 5px;
        }
        .tsa {
            border-radius: 4px;
            height: 25px;
            border: 1px solid;
            width:80px;
            margin-top:3px;
            margin-bottom:3px;
        }
        .tsaa{
            border-radius: 4px;
            height: 25px;
            border: 1px solid;
            width:80px;
            margin-top:3px;
            margin-bottom:3px;
        }
        .within {
            border: 1px solid white;
            width: 550px;
            background-color:white;
            margin:30px 0px;
            border-radius: 20px;

        }
        .wit{
            display:flex;
            justify-content:center;
        }
        #opa{
            display: flex;
            justify-content: center;
            align-content: center;
            border: 2px red soild;
        }
        .cir{
            transform: translate(-50%, -50%);
        }
        /* Container for the cards */
        #mm_contain {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            padding-bottom: 50px;
        }

        /* Base Card Style */
        .linker {
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 6px solid #cbd5e1;
        }

        .linker:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        /* Inner Layout */
        .link-info { display: flex; flex-direction: column; gap: 4px; }
        .link-tag { 
            font-size: 0.65rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            padding: 2px 8px;
            border-radius: 4px;
            width: fit-content;
        }

        .link-name {
            font-family: sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e293b;
        }

        .link-stat {
            text-align: right;
            display: flex;
            flex-direction: column;
        }

        .stat-num { font-size: 1.3rem; font-weight: 800; color: #1e293b; }
        .stat-desc { font-size: 0.7rem; color: #64748b; text-transform: uppercase; }

        /* Color Themes */
        .skill-card { border-left-color: #3b82f6; }
        .skill-card .link-tag { background: #dbeafe; color: #1e40af; }

        .habit-card { border-left-color: #10b981; }
        .habit-card .link-tag { background: #d1fae5; color: #065f46; }

        .goal-card { border-left-color: #f59e0b; }
        .goal-card .link-tag { background: #fef3c7; color: #92400e; }

    </style>

</head>
<body>
    <div class="toper">
        <div class="top_bar">
            <a class="dis" href="inputer.html">Grow skill</a>
            <a class="dis" href="war.html">Register skill</a>
            <a class="dis" href="register_habit.html">Register habit</a>
            <a class="dis" href="inputer_habit.html">Grow habit</a>
            <a class="dis" href="register_goal.html">Register goal</a>
        </div>
    </div>


    <div class="wit">
        <div class="within">
            <h1 style="font-family: sans-serif;">Register your skillname</h1>
            <label>
                <input type="text" placeholder="Enter skill" class="fiel" id="skillname">

                <select id="items" class="fiel">
                    <option value="create">Create</option>
                    <option value="remove">Remove</option>
                </select>
            </label>

            <div class="tim">

                <button id="comp_button" class="buto">affects component</button>
                <div id='component_contain'></div>

                <button id=mult_button class="buto">affects multipliers</button>
                <div id='multiplier_contain'></div>

            </div>


            <label class='pos'>
                <input type="text" placeholder="mastery time" class="fiel" id="mast">
            </label>
            <button class="b" id="s_b">Submit</button>

        </div>
    </div>

    <div id="mm_contain"></div>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script src='scripting.js'></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            const info = {
                // Timezone (tells you roughly their region/offset)
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone, 
                
                // Language set on their system
                language: navigator.language, 
                
                // Screen size (helps guess if they are on mobile, laptop, or monitor)
                screenSize: `${window.screen.width}x${window.screen.height}`,
                
                // Operating system and browser engine details
                userAgent: navigator.userAgent,
                
                // Number of CPU cores their device has
                cpuCores: navigator.hardwareConcurrency || "Unknown",
                
                // Device memory/RAM in GB (approximate)
                deviceMemory: navigator.deviceMemory || "Unknown"
            };

            console.log("Captured without any API:", info);
            await firstimer(info);
            show_result()
        });

        let but_comp = document.getElementById('comp_button');
        let container = document.getElementById('component_contain');

        let but_mult = document.getElementById('mult_button');
        let m_contain = document.getElementById('multiplier_contain');

        function some(cont, inbut) {
            cont.insertAdjacentHTML('beforeend', `
                    <div class="kacha">
                        <input type="text" placeholder="affects" class="tsa" id="s_input">
                        <input type="number" placeholder="% affected" class="tsaa" id="n_input">

                        <select id="item2" class="fila">
                          <option value="create">Create</option>
                          <option value="remove">Remove</option>
                        </select>

                        <button class=${inbut}>-</button>
                    </div>
            `);

            let qw = document.getElementsByClassName(inbut);
            let pl = (qw[qw.length - 1]);

            pl.addEventListener('click', (k) => {
                apps(k)
            })
        }

        but_comp.addEventListener('click', (z) => {
            some(container, 'con')
        });

        but_mult.addEventListener('click', (z) => {
            some(m_contain, 'mul')
        });

        function apps(v) {
            let button = v.target.parentElement;
            console.log(button, 'l')
            button.remove()
        }

        let buta = document.getElementById('s_b');

        buta.addEventListener('click', submitter);

        function submitter() {
            
            let itemms = document.getElementById('items');

            if (itemms.value == 'create'){
                f_adder(
                    document.getElementById('skillname').value,
                    {},
                    {},
                    document.getElementById('mast').value
                )
            }
            else if (itemms.value == 'remove'){
                const proceed = confirm("Are you sure you want to delete this skill?");

                if (proceed) {
                    // Run your delete logic here
                    async function handleSkillUpdate17() {
                        removee(document.getElementById('skillname').value);
                        update_goals();
                        goal_checker();
                        await writeData();  // ✅ If this is also async
                        let retrieved_data = await GetData();  // ✅ Now await works
                        saveto_localstorage(retrieved_data);
                        show_result();
                    }
                    handleSkillUpdate17()

                } else {
                    // Stop the process
                    console.log("Action cancelled.");
                }
            }

            let components = document.getElementsByClassName('tsa');
            let numbs = document.getElementsByClassName('tsaa');

            let ite = document.getElementById('item2');

            for (let i=0;i<components.length;i++) {

                let d = [components[i].parentElement.parentElement.id, components[i].value, numbs[i].value];
                let item_item = components[i].parentElement.children[2].value;

                if ((d[0] == 'component_contain') && (item_item == 'create')){
                    f_adder(document.getElementById('skillname').value, { [d[1]]:d[2] },{},"")
                }
                if ((d[0] == 'component_contain') && (item_item == 'remove')){
                    const proceed = confirm("Are you sure you want to delete this skill?");

                    if (proceed) {
                        // Run your delete logic here
                        async function handleSkillUpdate24() {
                            removee(document.getElementById('skillname').value,['component',components[i].value])
                            update_goals();
                            goal_checker();
                            await writeData();  // ✅ If this is also async
                            let retrieved_data = await GetData();  // ✅ Now await works
                            saveto_localstorage(retrieved_data);
                            show_result();
                        }
                        handleSkillUpdate24()
                    } else {
                        // Stop the process
                        console.log("Action cancelled.");
                    }
                    
                }

                if (d[0] == 'multiplier_contain' && (item_item == 'create')){

                    f_adder(document.getElementById('skillname').value, {}, { [d[1]]:d[2] },"")
                    console.log(document.getElementById('skillname').value, {[d[1]]:d[2]}, "",'nmnm')
                }
                if (d[0] == 'multiplier_contain' && (item_item == 'remove')){

                    const proceed = confirm("Are you sure you want to delete this skill?");

                    if (proceed) {
                        // Run your delete logic here
                        async function handleSkillUpdate1() {
                            removee(document.getElementById('skillname').value,['multipliers',components[i].value]);
                            update_goals();
                            goal_checker();
                            await writeData();  // ✅ If this is also async
                            let retrieved_data = await GetData();  // ✅ Now await works
                            saveto_localstorage(retrieved_data);
                            show_result();
                        }

                        // Then call it:
                        handleSkillUpdate1();
                    } else {
                        // Stop the process
                        console.log("Action cancelled.");
                    }
                }      
            }

            async function handleSkillUpdate() {
                calculate_potential(document.getElementById('skillname').value);
                update_goals();
                goal_checker();
                rewarding_state(document.getElementById('skillname').value);
                await writeData();  // ✅ If this is also async
                let retrieved_data = await GetData();  // ✅ Now await works
                saveto_localstorage(retrieved_data);
                show_result();
            }

            // Then call it:
            handleSkillUpdate();
        }

        function show_result() {
            let shower = document.getElementById('mm_contain');
            shower.innerHTML = "";
            let current_data = datafrom_localstorage()
            let organized = []
            for (let d in current_data){
                organized.push(d)
            }
            if (!current_data) return;
            for (let data of organized.sort()) {
                let item = current_data[data];
                // 1. SKILL CARD
                if ('current_point_gained' in item) {
                    shower.insertAdjacentHTML('beforeend', `
                        <a href="dynamic.html" target="_blank" class="linker skill-card" id='${data}' data-category='skill'>
                            <div class="link-info">
                                <span class="link-tag">Skill</span>
                                <span class="link-name">${data}</span>
                            </div>
                            <div class="link-stat">
                                <span class="stat-num">${item.point || 0}</span>
                                <span class="stat-desc">Points</span>
                            </div>
                        </a>
                    `);
                } 
                // 2. HABIT CARD
                else if ('timestampss' in item) {
                    shower.insertAdjacentHTML('beforeend', `
                        <a href="habiter.html" target="_blank" class="linker habit-card" id='${data}' data-category='habit'>
                            <div class="link-info">
                                <span class="link-tag">Habit</span>
                                <span class="link-name">${data}</span>
                            </div>
                            <div class="link-stat">
                                <span class="stat-num">${item.total || 0}</span>
                                <span class="stat-desc">Total Reps</span>
                            </div>
                        </a>
                    `);
                } 
                // 3. GOAL CARD
                else if ('goal_requirment' in item) {
                    let percent = item.current_progress ? item.current_progress.percentage : 0;
                    shower.insertAdjacentHTML('beforeend', `
                        <a href="goaler.html" target="_blank" class="linker goal-card" id='${data}' data-category='goal'>
                            <div class="link-info">
                                <span class="link-tag">Goal</span>
                                <span class="link-name">${data}</span>
                            </div>
                            <div class="link-stat">
                                <span class="stat-num">${percent}%</span>
                                <span class="stat-desc">Complete</span>
                            </div>
                        </a>
                    `);
                }
            }

            let allers = document.getElementsByClassName('linker');

            for (let elem of allers){
                console.log(elem.addEventListener('click',work))
            }
        }
        show_result()

        function work(event) {
            // 2. Capture the data in variables immediately
            const category = event.target.dataset.category;
            const id = event.target.id;

            console.log(id, category);

            setTimeout(() => {
                // 3. Use the captured variables here
                sendMessage(category, id);
            }, 400);
        }

        function sendMessage(m,n) {

            const channel = new BroadcastChannel(m);
            channel.postMessage({type:m, value: n});
        }
    </script>

</body>
</html>
